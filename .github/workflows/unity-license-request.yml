name: Unity License Request (No Local Install)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  request-activation-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request Unity activation file (.alf)
        id: activation
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 2022.3.40f1

      - name: Upload activation file artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ${{ steps.activation.outputs.filePath }}
          retention-days: 3

