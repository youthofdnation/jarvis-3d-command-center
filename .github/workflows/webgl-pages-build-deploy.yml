name: WebGL Build and Deploy (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - ".github/workflows/webgl-pages-build-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: webgl-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-

      - name: Build WebGL in CI
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: WebGL
          unityVersion: 2022.3.40f1
          buildMethod: WebGLBuildTools.BuildReleaseFromCommandLine

      - name: Validate build output
        run: |
          test -f "Builds/WebGL/index.html" || (echo "Missing Builds/WebGL/index.html" && exit 1)

      - name: Prepare Pages artifact
        run: |
          rm -rf pages
          mkdir -p pages
          cp -R Builds/WebGL/* pages/
          touch pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

